services:
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    networks:
      - medusa_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgres://medusa:medusa@postgres:5432/medusa}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-supersecret}
      - COOKIE_SECRET=${COOKIE_SECRET:-supersecret}
      - STORE_CORS=${STORE_CORS:-http://localhost:8000}
      - ADMIN_CORS=${ADMIN_CORS:-http://localhost:9000}
      - AUTH_CORS=${AUTH_CORS:-http://localhost:8000,http://localhost:9000}
    networks:
      - medusa_network
      - coolify
    # The storefront waits for this healthcheck before building. /health returns
    # 200 only after the entrypoint finished migrations + seed, so by the time
    # the backend is "healthy" the publishable key already exists in the DB.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      # No build args: NEXT_PUBLIC_* are no longer baked at image-build time.
      # The build runs at container start (see apps/storefront/docker-entrypoint.sh)
      # once the publishable key can be fetched from the database.
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      # Used by the entrypoint to read the seeded publishable key from Postgres.
      - DATABASE_URL=${DATABASE_URL:-postgres://medusa:medusa@postgres:5432/medusa}
      # Server-side URL: stays inside Docker network, used by SSR and middleware.
      - MEDUSA_BACKEND_URL=http://backend:9000
      # Public URL: set this in Coolify to your backend's public URL for browser-side calls.
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://backend:9000}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_DEFAULT_REGION=${NEXT_PUBLIC_DEFAULT_REGION:-dk}
    networks:
      - medusa_network
      - coolify
    volumes:
      # Persist the Next.js build output so restarts reuse it; the entrypoint
      # rebuilds only when the source fingerprint or public config changed.
      - storefront_next:/app/apps/storefront/.next

volumes:
  postgres_data:
  storefront_next:

networks:
  medusa_network:
    driver: bridge
  coolify:
    external: true
